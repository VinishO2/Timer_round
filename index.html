<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="visors"> 
        <h1>Boxe Time</h1>
        <h2><span id="visorsec">00:00</span></h2>
        <h3>Round <span id="visorround">0</h3>
        <h3>Total <span id="totalrounds">0</h3>
    </div>

    <div class="selects">
        <select id="rounds">
            <option value="1">1 Round</option>
            <option value="2">2 Rounds</option>
            <option value="3">3 Rounds</option>
            <option value="4">4 Rounds</option>
            <option value="5">5 Rounds</option>
        </select>

        <select id="seconds">
            <option value="3">30 Segundos</option>
            <option value="60">60 Segundos</option>
            <option value="90">90 Segundos</option>
            <option value="120">120 Segundos</option>
            <option value="180">180 Segundos</option>
        </select>

        <select id="rest">
            <option value="10">10 Segundos</option>
            <option value="30">30 Segundos</option>
            <option value="60">60 Segundos</option>
        </select>
    </div>

    <div class="buttons">
        <button id="startBtn">Iniciar</button>
        <button id="pauseBtn">Pausar</button>
        <button id="resetBtn">Reset</button>
        <button id="finishBtn">Finalizar</button>
    </div>



    <script src="script.js"></script>
</body>
</html>
